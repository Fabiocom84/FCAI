<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="dark-mode.css">
    <title>Distribuzione Ore - Segretario AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-v2.css?v=8">
    <link rel="stylesheet" href="distribuzione-ore.css?v=1">
</head>

<body class="internal-page">

    <!-- APP SHELL STANDARD -->
    <div class="std-app-shell">

        <!-- HEADER STANDARD -->
        <header class="std-app-header">
            <a href="index.html" class="header-button">
                <img src="img/log-out.png" alt="Back" style="transform: rotate(180deg);">
                <span>Home</span>
            </a>
            <div class="header-title-container" style="flex-grow: 1; text-align: center;">
                <h1>Distribuzione Ore</h1>
                <p class="subtitle" style="font-size: 0.8rem; opacity: 0.7; margin: 0;">Ordini di Produzione</p>
            </div>
            <div style="width: 80px;"></div>
        </header>

        <!-- CONTENUTO -->
        <div class="std-app-content">
            <div class="dist-wrapper">

                <!-- SEZIONE 1: SELEZIONE COMMESSA -->
                <div class="dist-selector-panel">
                    <div class="selector-row">
                        <div class="selector-group">
                            <label for="commessaSelect">🏭 Commessa</label>
                            <select id="commessaSelect" class="dist-select">
                                <option value="">— Seleziona una commessa —</option>
                            </select>
                        </div>
                        <button id="btnCarica" class="dist-btn dist-btn--primary" disabled>
                            📊 Carica
                        </button>
                    </div>
                </div>

                <!-- SEZIONE 2: RIEPILOGO (nascosto fino a selezione) -->
                <div id="summaryPanel" class="dist-summary-panel" style="display: none;">
                    <div class="summary-cards">
                        <div class="summary-card">
                            <div class="summary-label">OP Totali</div>
                            <div class="summary-value" id="sumOpTotali">0</div>
                        </div>
                        <div class="summary-card">
                            <div class="summary-label">OP Aperti</div>
                            <div class="summary-value highlight" id="sumOpAperti">0</div>
                        </div>
                        <div class="summary-card">
                            <div class="summary-label">OP Chiusi</div>
                            <div class="summary-value" id="sumOpChiusi">0</div>
                        </div>
                        <div class="summary-card accent">
                            <div class="summary-label">Ore Lavorate (totale)</div>
                            <div class="summary-value" id="sumOreLavorate">0h</div>
                        </div>
                        <div class="summary-card">
                            <div class="summary-label">Ore Contabilizzate</div>
                            <div class="summary-value" id="sumOreContabilizzate" style="color:#27ae60;">0h</div>
                        </div>
                        <div class="summary-card accent">
                            <div class="summary-label">Ore da Distribuire</div>
                            <div class="summary-value" id="sumOreDaDistribuire" style="color:#e67e22;">0h</div>
                        </div>
                    </div>

                    <!-- Ore per mese -->
                    <div class="ore-mesi-container">
                        <h4>⏱️ Ore lavorate per mese</h4>
                        <div id="oreMesiGrid" class="ore-mesi-grid">
                            <!-- Popolato via JS -->
                        </div>
                    </div>
                </div>

                <!-- SEZIONE 3: BARRA AZIONI -->
                <div id="actionsBar" class="dist-actions-bar" style="display: none;">
                    <button id="btnElabora" class="dist-btn dist-btn--ai" disabled>
                        🤖 Elabora Distribuzione
                    </button>
                    <label class="toggle-chiusi">
                        <input type="checkbox" id="toggleChiusi">
                        <span>Mostra OP chiusi</span>
                    </label>
                    <div class="actions-spacer"></div>
                    <button id="btnChiudiSelezionati" class="dist-btn dist-btn--success" disabled>
                        ✅ Chiudi Selezionati
                    </button>
                </div>

                <!-- SEZIONE 4: TABELLA OP -->
                <div id="tableContainer" class="dist-table-container" style="display: none;">
                    <div class="table-responsive">
                        <table class="dist-table" id="opTable">
                            <thead>
                                <tr>
                                    <th class="col-check">
                                        <input type="checkbox" id="checkAll" title="Seleziona tutti">
                                    </th>
                                    <th class="col-op">Ordine di Produzione</th>
                                    <th class="col-storico">Storico Articolo</th>
                                    <th class="col-ore-ai">Ore AI</th>
                                    <th class="col-dettaglio">Dettaglio Lavorazioni</th>
                                    <th class="col-ore-finali">Ore Finali</th>
                                </tr>
                            </thead>
                            <tbody id="opTableBody">
                                <!-- Popolato via JS -->
                            </tbody>
                            <tfoot>
                                <tr class="totals-row">
                                    <td></td>
                                    <td class="totals-label">TOTALI</td>
                                    <td></td>
                                    <td class="totals-value" id="totalOreAI">—</td>
                                    <td></td>
                                    <td class="totals-value" id="totalOreFinali">—</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/libs/supabase.min.js" defer></script>
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/core-init.js"></script>
    <script type="module" src="js/auth-guard.js"></script>
    <script type="module" src="js/api-client.js"></script>
    <script type="module" src="js/distribuzione-ore.js?v=3"></script>
    <script src="js/dark-mode.js"></script>
</body>

</html>
